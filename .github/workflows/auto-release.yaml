name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: read

jobs:
  quality:
    name: PHP ${{ matrix.php }} release checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.4"
          - "8.5"

    steps:
      - name: Check out the tagged revision
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          composer tools:install

      - name: Run quality checks
        run: composer check

      - name: Audit dependencies
        run: |
          composer audit --no-interaction
          composer audit --working-dir=tools/phpstan --no-interaction
          composer audit --working-dir=tools/php-cs-fixer --no-interaction

  release:
    name: Publish GitHub release
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate the release tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Create release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
