name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  quality:
    name: PHP ${{ matrix.php }} quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.4"
          - "8.5"

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          composer tools:install

      - name: Audit dependencies
        run: |
          composer audit --no-interaction
          composer audit --working-dir=tools/phpstan --no-interaction
          composer audit --working-dir=tools/php-cs-fixer --no-interaction

      - name: Run PHPUnit
        run: composer test

      - name: Run PHPStan
        run: composer phpstan

      - name: Check code style
        run: composer style
