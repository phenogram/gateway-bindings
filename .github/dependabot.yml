version: 2
updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: composer
    directory: /tools/phpstan
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: composer
    directory: /tools/php-cs-fixer
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
